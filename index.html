    <style>
      :root {
        --paper: #fbfbfa;
        --ink: #18181a;
        --ink-soft: #86868a;
        --ink-faint: #b6b6ba;

        --font:
          "Geist", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --ease: cubic-bezier(0.22, 1, 0.36, 1);
        --pad: clamp(1.5rem, 5vmin, 3.25rem);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        margin: 0;
        overflow: hidden;
      }

      body {
        background: var(--paper);
        color: var(--ink);
        font-family: var(--font);
        font-weight: 400;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }

      ::selection {
        background: var(--ink);
        color: var(--paper);
      }

      .wrap {
        height: 100dvh;
        display: grid;
        place-items: center;
        padding: var(--pad);
        position: relative;
      }

      .card {
        width: 100%;
        max-width: 840px;
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: center;
        gap: clamp(2rem, 7vmin, 5rem);
      }

      /* ---- Identity ---- */
      .name {
        margin: 0;
      }
      .name-btn {
        font-family: inherit;
        font-weight: 600;
        font-size: clamp(2rem, 6.4vmin, 3.5rem);
        line-height: 1.04;
        letter-spacing: -0.025em;
        color: var(--ink);
        background: none;
        border: 0;
        padding: 0;
        /* pull left by the glyph's side-bearing so ink aligns flush */
        margin: 0 0 0 -0.08em;
        text-align: left;
        cursor: pointer;
        transition: opacity 0.3s var(--ease);
      }
      @media (hover: hover) {
        .name-btn:hover {
          opacity: 0.6;
        }
      }
      .name-btn:focus-visible {
        outline: 2px solid var(--ink);
        outline-offset: 5px;
        border-radius: 2px;
      }

      .role {
        margin: clamp(0.25rem, 0.8vmin, 0.45rem) 0 0 calc(-0.055em - 1px);
        font-weight: 400;
        font-size: clamp(0.92rem, 2.15vmin, 1.12rem);
        letter-spacing: -0.005em;
        color: var(--ink-soft);
      }

      /* ---- Actions: icon links + Resume ---- */
      .actions {
        margin: clamp(1.7rem, 4.4vmin, 2.6rem) 0 0;
        display: flex;
        align-items: center;
        gap: clamp(0.7rem, 2vmin, 1rem);
      }
      .socials {
        display: inline-flex;
        align-items: center;
        gap: clamp(0.5rem, 1.5vmin, 0.72rem);
      }
      .icon {
        display: inline-flex;
        color: var(--ink);
        transition:
          transform 0.3s var(--ease),
          opacity 0.3s var(--ease);
      }
      .icon svg {
        display: block;
        width: clamp(21px, 2.7vmin, 25px);
        height: auto;
      }
      .icon:focus-visible {
        transform: translateY(-2px);
        opacity: 0.6;
        outline: none;
      }
      @media (hover: hover) {
        .icon:hover {
          transform: translateY(-2px);
          opacity: 0.6;
        }
      }

      .divider {
        width: 1px;
        height: clamp(15px, 2.2vmin, 19px);
        background: var(--ink-faint);
        margin-inline: 0;
      }

      .resume {
        position: relative;
        display: inline-flex;
        align-items: baseline;
        gap: 0.4em;
        text-decoration: none;
        color: var(--ink);
        font-weight: 500;
        font-size: clamp(0.9rem, 2.1vmin, 1.05rem);
        letter-spacing: -0.005em;
      }
      .resume .arr {
        color: var(--ink-faint);
        transform: translate(-3px, 0);
        opacity: 0;
        transition:
          transform 0.35s var(--ease),
          opacity 0.3s var(--ease),
          color 0.3s var(--ease);
      }
      .resume::after {
        content: "";
        position: absolute;
        left: 0;
        bottom: -0.16em;
        height: 1px;
        width: 100%;
        background: currentColor;
        transform: scaleX(0);
        transform-origin: left;
        transition: transform 0.4s var(--ease);
      }
      .resume:focus-visible {
        outline: none;
      }
      .resume:focus-visible::after {
        transform: scaleX(1);
      }
      .resume:focus-visible .arr {
        transform: translate(2px, 0);
        opacity: 1;
        color: var(--ink);
      }
      @media (hover: hover) {
        .resume:hover::after {
          transform: scaleX(1);
        }
        .resume:hover .arr {
          transform: translate(2px, 0);
          opacity: 1;
          color: var(--ink);
        }
      }

      /* ---- QR ---- */
      .qr {
        display: none;
        transition: opacity 0.4s var(--ease);
      }
      .card.is-open .qr {
        display: inline-flex;
        animation: qrIn 0.55s var(--ease) both;
      }
      @media (hover: hover) {
        .qr:hover {
          opacity: 0.68;
        }
      }
      @keyframes qrIn {
        from {
          opacity: 0;
          transform: scale(0.94) translateY(8px);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }
      .qr-svg {
        display: block;
        width: clamp(116px, 17vmin, 162px);
        height: auto;
        color: var(--ink);
      }

      /* ---- Footer clock ---- */
      .foot {
        position: absolute;
        left: var(--pad);
        bottom: var(--pad);
        font-size: clamp(0.6rem, 1.4vmin, 0.7rem);
        font-weight: 500;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--ink-faint);
      }
      .foot b {
        font-weight: 500;
        color: var(--ink-soft);
        font-variant-numeric: tabular-nums;
      }
      .privacy-link {
        color: inherit;
        text-decoration: none;
        transition: color 0.3s var(--ease);
      }
      .privacy-link:focus-visible {
        color: var(--ink-soft);
        outline: none;
      }
      @media (hover: hover) {
        .privacy-link:hover {
          color: var(--ink-soft);
        }
      }

      /* ---- Entrance ---- */
      .rise {
        opacity: 0;
        transform: translateY(10px);
        animation: rise 0.85s var(--ease) forwards;
        animation-delay: var(--d, 0s);
      }
      @keyframes rise {
        to {
          opacity: 1;
          transform: none;
        }
      }

      /* ---- Responsive: stack, still one viewport ---- */
      @media (max-width: 720px), (max-aspect-ratio: 4/5) {
        .card {
          grid-template-columns: 1fr;
          justify-items: start;
          gap: clamp(2.2rem, 8vmin, 3.2rem);
        }
        .name-btn {
          font-size: clamp(2.1rem, 10vmin, 3rem);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .rise {
          animation: none;
          opacity: 1;
          transform: none;
        }
        .icon,
        .resume,
        .resume::after,
        .resume .arr,
        .qr {
          transition: none;
        }
      }
    </style>

    <script>
      // Live Sydney time — a quiet nod to the timeline that used to live here.
      (function () {
        var el = document.getElementById("clock");
        if (!el) return;
        var fmt = new Intl.DateTimeFormat("en-AU", {
          timeZone: "Australia/Sydney",
          hour: "numeric",
          minute: "2-digit",
          hour12: true,
        });
        function tick() {
          el.textContent = fmt.format(new Date()).toUpperCase();
        }
        tick();
        setInterval(tick, 1000);
      })();

      // Reveal the QR code when the name is clicked.
      (function () {
        var btn = document.getElementById("nameBtn");
        var card = document.querySelector(".card");
        if (!btn || !card) return;
        btn.addEventListener("click", function () {
          var open = card.classList.toggle("is-open");
          btn.setAttribute("aria-expanded", open ? "true" : "false");
        });
      })();
    </script>
